<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let output = [];
      let num = 1;

      function fizzbuzz() {
        let count = 0;
        while (count <= 50) {
          if (num % 3 == 0 && num % 5 == 0) {
            output.push("FizzBuzz");
          } else if (num % 3 == 0) {
            output.push("Fizz");
          } else if (num % 5 == 0) {
            output.push("Buzz");
          } else {
            output.push(num);
          }
          num++;
          count++;
        }

        console.log(output);
      }
    </script>
  </head>

</html>
