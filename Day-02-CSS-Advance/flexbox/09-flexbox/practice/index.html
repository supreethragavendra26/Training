<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        display: flex;
        align-items: center;
        width: 300px;
        justify-content: center;
        flex-wrap: wrap;
        height: 400px;
        box-sizing: border-box;
      }
      .box {
        background-color: aquamarine;
        width: 120px;
        height: 120px;
        border: 2px solid black;
        margin: 4px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/Assets/img/img1.png" alt="Image 1" class="box" />
      <img src="/Assets/img/img2.png" alt="Image 2" class="box" />
      <img src="/Assets/img/img3.png" alt="Image 3" class="box" />
      <img src="/Assets/img/img4.png" alt="Image 4" class="box" />
    </div>
  </body>
</html>
