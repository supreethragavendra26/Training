<html lang="en">

    <title>Document</title>

  <body>
    <!-- Script -->
    <script>
      var name = "Hello";
      console.log(name.slice(0, 2));
      console.log(name.toUpperCase());
      console.log(name.toLowerCase());
      var x = 5;
      x++;
      console.log(x);
      x--;
      console.log(x);

      function greet() {
        alert("Hello ");
      }

      for (let i = 0; i <= 5; i++) {
        greet();
      }
    </script>
  </body>
