<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      .conta {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        width: 100px;
        height: 200px;

        background-color: black;
      }
    </style>
  </head>
  <body>
    <h2 class="m-5">Buttons and cards</h2>

    <!-- 
    Exercise 1 (5 min)

Create a webpage with:

A primary button for "Login"
A success button for "Save"
A danger button for "Delete"
 -->

    <div class="conta">
      <div class="box">
        <button class="btn btn-danger m-3">Delete</button>
        <button class="btn btn-success m-3">Save</button>
        <button class="btn btn-primary m-3">Login</button>

        <!-- <button class="btn btn-primary disabled">Out of Stock</button> -->
      </div>
    </div>

    <!-- 
    Create an e-commerce product card containing:

Product image


"Add to Cart" button
 -->

    <div class="conta">
      <div class="card mt-5" style="width: 18rem">
        <img src="./dog.jpg" alt="" srcset="" />
        <div class="card-body">
          <h6 class="card-title">Product name</h6>
          <p class="text">Price</p>
          <a href="#" class="btn btn-primary">Add to Cart</a>
        </div>
      </div>
    </div>
  </body>
</html>
