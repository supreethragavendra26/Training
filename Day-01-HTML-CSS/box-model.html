<!-- 
 Exercise 2 (5 min)

Create two <div> elements and add:

Margin: 15px
Border: 1px solid blue

Observe the space between them.
 -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Styles -->
    <style>
      .box {
        width: 100px;
        height: 50px;
        background-color: red;
        margin: 15px;
        border: 1px solid blue;
      }
    </style>
  </head>

  <body>
    <!-- Box 1 -->
    <div class="box"></div>
    <!-- Box 2 -->
    <div class="box"></div>
  </body>
</html>
