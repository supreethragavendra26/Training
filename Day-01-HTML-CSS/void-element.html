<!-- 
Create a webpage containing:

One heading
One image
One line break
One horizontal line
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <!-- Heading -->
    <h1>My Heading</h1>
    <!-- Image -->
    <img src="assets/js.webp" alt="icon-js" width="200px" />
    <!-- Line break -->
    <br />
    <!-- Horizontal rule -->
    <hr />
  </body>
</html>
